version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  disable:
    # Intentionally off for now — the codebase has some pre-existing dead
    # symbols. Enable after a dead-code cleanup.
    - unused
  settings:
    staticcheck:
      # Keep the bug-finding SA checks; skip the opinionated quick-fix (QF)
      # style suggestions.
      checks:
        - all
        - -QF1003
        - -QF1012

formatters:
  enable:
    - gofmt
