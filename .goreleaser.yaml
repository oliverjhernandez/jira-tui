# GoReleaser configuration. Docs: https://goreleaser.com
version: 2

project_name: jira-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: jira-tui
    main: ./cmd/jira-tui
    binary: jira-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: jira-tui
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge branch"

homebrew_casks:
  - name: jira-tui
    repository:
      owner: oliverjhernandez
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/oliverjhernandez/jira-tui"
    description: "Terminal UI for Jira"
    # Strip the Gatekeeper quarantine flag so the unsigned binary runs.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/jira-tui"]
          end

release:
  prerelease: auto
  # Overwrite assets if the release already exists, so a re-run of a tag
  # (e.g. after a later step failed) doesn't 422 on duplicate uploads.
  replace_existing_artifacts: true
